<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Software Helper</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;600;800&display=swap"
        rel="stylesheet">
    <style>
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 10;
            padding: 20px;
            padding-top: 100px;
        }

        .auth-card {
            width: 100%;
            max-width: 450px;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 243, 255, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .form-container {
            position: relative;
            z-index: 2;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
        }

        .auth-form h2 {
            font-size: 2.2rem;
            margin-bottom: 5px;
            line-height: 1.2;
        }

        .auth-form .subtitle {
            font-size: 0.9rem;
            margin-bottom: 25px;
            opacity: 0.7;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group label {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 1rem;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .input-group input:focus,
        .input-group input:valid,
        .input-group input.has-val {
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.05);
        }

        .input-group input:focus+label,
        .input-group input:valid+label,
        .input-group input.has-val+label {
            top: 0;
            font-size: 0.8rem;
            background: #0a0a0a;
            padding: 0 5px;
            color: var(--neon-blue);
            border-radius: 3px;
        }

        .focus-border {
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 2px;
            background: var(--neon-blue);
            transition: all 0.4s ease;
            transform: translateX(-50%);
        }

        .input-group input:focus~.focus-border {
            width: 100%;
        }

        .submit-btn {
            width: 100%;
            text-align: center;
            font-size: 1.1rem;
            padding: 15px;
            border-radius: 8px;
            background: rgba(0, 243, 255, 0.1);
            border: 1px solid var(--neon-blue);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .submit-btn:hover {
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.4);
            background: rgba(0, 243, 255, 0.25);
        }

        .back-link {
            display: block;
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            text-decoration: none;
            transition: color 0.3s ease;
            font-family: 'Outfit', sans-serif;
        }

        .back-link:hover {
            color: #fff;
        }

        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .msg-box {
            font-size: 0.9rem;
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 5px;
            display: none;
            text-align: center;
        }

        .msg-box.error {
            display: block;
            background: rgba(255, 7, 58, 0.2);
            border: 1px solid var(--neon-red);
            color: #fff;
        }

        .msg-box.success {
            display: block;
            background: rgba(0, 243, 255, 0.2);
            border: 1px solid var(--neon-blue);
            color: #fff;
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 30px 20px;
            }

            .auth-form h2 {
                font-size: 1.8rem;
            }

            .auth-wrapper {
                padding: 80px 15px 20px;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="logo"><span class="neon-text-logo">Software <span class="neon-red">Helper</span></span></div>
        <div class="nav-links"><a href="index.html" class="btn-login-register neon-btn"
                style="text-decoration: none;">Home</a></div>
    </nav>
    <div class="canvas-container"
        style="background: url('keyboard imgs/00001.jpg') center/cover no-repeat; opacity: 0.2;">
        <div class="overlay-gradient"></div>
    </div>

    <main class="auth-wrapper">
        <div class="auth-card">
            <div class="form-container">
                <form id="form-forgotpass" class="auth-form">
                    <h2>Reset <span class="neon-blue">Password</span></h2>
                    <p class="subtitle">Enter your email or mobile number. We will generate a secure OTP for you.</p>
                    <div id="reset-msg" class="msg-box"></div>
                    <div class="input-group">
                        <input type="text" id="reset-identifier" required>
                        <label for="reset-identifier">Email or Mobile Number</label>
                        <span class="focus-border"></span>
                    </div>
                    <button type="submit" class="submit-btn" id="reset-submit-btn">
                        <span class="btn-text">Send Reset Link</span>
                        <div class="spinner"></div>
                    </button>
                    <a href="login.html" class="back-link">← Back to Login</a>
                </form>
            </div>
        </div>
    </main>

    <script type="module">
        import { db } from "./firebase-config.js";
        import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const formForgotPass = document.getElementById('form-forgotpass');
        const resetMsg = document.getElementById('reset-msg');
        const btnText = document.querySelector('.btn-text');
        const spinner = document.querySelector('.spinner');
        const submitBtn = document.getElementById('reset-submit-btn');

        document.querySelectorAll('.input-group input').forEach(input => {
            input.addEventListener('change', () => {
                if (input.value.length > 0) input.classList.add('has-val');
                else input.classList.remove('has-val');
            });
            if (input.value.length > 0) input.classList.add('has-val');
        });

        const showMessage = (type, message) => {
            resetMsg.textContent = message;
            resetMsg.className = `msg-box ${type}`;
        }

        formForgotPass.addEventListener('submit', async (e) => {
            e.preventDefault();
            const identifier = document.getElementById('reset-identifier').value.trim();

            btnText.style.display = 'none';
            spinner.style.display = 'block';
            submitBtn.disabled = true;

            try {
                // Generate a 6-digit random OTP automatically
                const otp = Math.floor(100000 + Math.random() * 900000).toString();

                // Save the data and the hidden OTP to Firebase Firestore database
                await addDoc(collection(db, "passwordResets"), {
                    identifier: identifier,
                    otp: otp,
                    status: 'pending',
                    createdAt: new Date().toISOString()
                });

                showMessage('success', 'Request received! Secure OTP will be sent to your email or mobile number.');

                // Note: The OTP is deliberately not displayed to the user as per your request.
                // In a future feature, you might want to automatically navigate to an OTP validation page.
            } catch (error) {
                console.error("Firestore Write Error:", error);
                showMessage('error', "Failed to process request. Please check Firestore Rules.");
            } finally {
                btnText.style.display = 'block';
                spinner.style.display = 'none';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
