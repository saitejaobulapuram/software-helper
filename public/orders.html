<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Orders - Software Helper</title>
    <!-- Base premium dark theme and fonts -->
    <link rel="stylesheet" href="style.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { background-color: var(--bg-dark); color: var(--text-primary); padding-top: 100px; overflow-x: hidden; }
        .dashboard-nav { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(0, 243, 255, 0.2); }
        .container { max-width: 900px; margin: 0 auto; padding: 40px; }
        .page-header { margin-bottom: 40px; }
        .page-header h1 { font-size: clamp(2rem, 5vw, 3.5rem); margin: 0; line-height: 1.1; }
        .orders-timeline { display: flex; flex-direction: column; gap: 30px; position: relative; }
        .orders-timeline::before { content: ''; position: absolute; left: 30px; top: 0; bottom: 0; width: 2px; background: rgba(255,255,255,0.05); }
        .order-card { background: var(--glass-bg); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 16px; padding: 30px; margin-left: 60px; position: relative; transition: all 0.3s ease; }
        .order-card:hover { border-color: rgba(0, 243, 255, 0.3); transform: translateX(5px); }
        .order-card::before { content: ''; position: absolute; left: -36px; top: 35px; width: 14px; height: 14px; border-radius: 50%; background: var(--bg-dark); border: 2px solid var(--neon-blue); z-index: 2; box-shadow: 0 0 10px var(--neon-blue); }
        .order-card::after { content: ''; position: absolute; left: -30px; top: 41px; width: 30px; height: 2px; background: rgba(255,255,255,0.1); z-index: 1; }
        .order-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 20px; }
        .order-title { font-size: 1.5rem; font-family: 'Outfit', sans-serif; font-weight: 600; margin: 0 0 5px 0; }
        .order-date { font-size: 0.85rem; color: var(--text-sec); }
        .status-badge { padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; letter-spacing: 0.5px; }
        .status-badge.dev { background: rgba(0, 243, 255, 0.15); color: var(--neon-blue); border: 1px solid rgba(0, 243, 255, 0.3); }
        .status-badge.completed { background: rgba(0, 255, 136, 0.15); color: #00ff88; border: 1px solid rgba(0, 255, 136, 0.3); }
        .order-body { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .detail-group label { display: block; color: var(--text-sec); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .detail-group p { margin: 0; font-size: 1.05rem; color: #fff; }
        .detail-group p.price { color: var(--neon-blue); font-weight: 600; font-size: 1.2rem; }
        .empty-orders { text-align: center; padding: 50px; color: var(--text-sec); background: rgba(255,255,255,0.02); border-radius: 16px; border: 1px dashed rgba(255,255,255,0.1); }
        @media (max-width: 768px) { .container { padding: 20px; } .orders-timeline::before { left: 15px; } .order-card { margin-left: 30px; padding: 20px; } .order-card::before { left: -21px; width: 10px; height: 10px; } .order-card::after { width: 15px; left: -15px; } .order-header { flex-direction: column; gap: 15px; } .order-body { grid-template-columns: 1fr; } }
        @media (max-width: 480px) { .container { padding: 15px; } .order-card { margin-left: 20px; padding: 15px; } .orders-timeline::before { left: 10px; } .order-card::before { left: -16px; } .order-card::after { width: 10px; left: -10px; } .order-title { font-size: 1.2rem; } }
    </style>
</head>
<body>
    <nav class="navbar dashboard-nav">
        <div class="logo">
            <span class="neon-text-logo">Software <span class="neon-red">Helper</span></span>
        </div>
        <div class="nav-links">
            <a href="dashboard.html" class="neon-btn" style="border-color: rgba(255,255,255,0.2);">← Back to Projects</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>Your <span class="neon-blue">Orders</span></h1>
            <p style="color:var(--text-sec);">Track the status of your customized digital products.</p>
        </div>
        
        <div class="orders-timeline" id="orders-container">
            <div class="empty-orders">Loading orders...</div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from "./firebase-config.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        onAuthStateChanged(auth, (user) => {
            if (user) { loadOrders(user); } 
            else { window.location.href = "login.html"; }
        });

        function loadOrders(user) {
            const userRef = doc(db, "users", user.uid);
            onSnapshot(userRef, (docSnap) => {
                if(docSnap.exists()) {
                    const data = docSnap.data();
                    renderOrders(data.orders || []);
                }
            }, (error) => {
                document.getElementById('orders-container').innerHTML = `<div class="empty-orders" style="color:var(--neon-red);">Firestore Error: Cannot access Orders. Ensure Firebase Rules allow reads. (${error.message})</div>`;
            });
        }

        function renderOrders(ordersArray) {
            const container = document.getElementById('orders-container');
            
            if(ordersArray.length === 0) {
                container.innerHTML = `
                    <div class="empty-orders">
                        You haven't placed any orders yet. <br><br>
                        <a href="dashboard.html" style="color:var(--neon-blue);">Browse projects</a> to get started.
                    </div>`;
                return;
            }

            container.innerHTML = '';
            
            // Sort orders newest first
            const sortedOrders = ordersArray.sort((a,b) => new Date(b.orderedAt) - new Date(a.orderedAt));

            sortedOrders.forEach(order => {
                const dateObj = new Date(order.orderedAt);
                const dateString = dateObj.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
                const isCompleted = order.status === 'Completed';

                const card = document.createElement('div');
                card.className = 'order-card';
                card.innerHTML = `
                    <div class="order-header">
                        <div>
                            <h3 class="order-title">${order.title}</h3>
                            <span class="order-date">Ordered on ${dateString}</span>
                        </div>
                        <span class="status-badge ${isCompleted ? 'completed' : 'dev'}">${order.status || 'Processing'}</span>
                    </div>
                    <div class="order-body">
                        <div class="detail-group">
                            <label>Amount Paid</label>
                            <p class="price">$${order.price.toFixed(2)}</p>
                        </div>
                        <div class="detail-group">
                            <label>Your Customizations</label>
                            <p style="color:var(--text-sec); font-size: 0.95rem;">${order.customNotes || 'None provided'}</p>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
